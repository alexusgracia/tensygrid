# Aquest workflow NO compila la documentació.
# La documentació es compila localment (amb accés al repositori VeraGrid privat)
# i es desplegua directament a la branca gh-pages via `manual/deploy.sh`.
#
# Aquest fitxer es conserva com a referència, però el CI no fa res actiu.
# GitHub Pages serveix automàticament la branca gh-pages sense necessitat de CI.

name: Docs status check

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Verify gh-pages branch exists
        run: |
          git fetch origin gh-pages 2>/dev/null \
            && echo "✅ gh-pages branch found — docs are deployed" \
            || echo "⚠️  gh-pages branch not found — run manual/deploy.sh to publish docs"